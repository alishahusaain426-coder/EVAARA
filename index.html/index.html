<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EVAARA - Elegant Fashion</title>

<!-- Google Fonts -->
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Poppins:wght@300;400;500&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    font-family: 'Poppins', sans-serif;
    display: flex;
    background: #fff;
}

/* SIDEBAR */
.sidebar {
    width: 220px;
    height: 100vh;
    background: linear-gradient(#ffe4ec, #fff);
    position: fixed;
    padding-top: 20px;
}

.sidebar h2 {
    text-align: center;
    font-family: 'Playfair Display', serif;
    color: #d63384;
}

.sidebar a {
    display: block;
    padding: 15px 25px;
    text-decoration: none;
    color: #d63384;
    font-weight: 500;
    transition: 0.3s;
}

.sidebar a:hover {
    background: #ffd6e8;
    padding-left: 35px;
}

/* MAIN CONTENT */
.main {
    margin-left: 220px;
    width: 100%;
}

header {
    background: #fff;
    padding: 20px;
    text-align: center;
}

header h1 {
    font-family: 'Playfair Display', serif;
    font-size: 38px;
    color: #d63384;
}

.hero {
    background: linear-gradient(to right, #fff, #ffe4ec);
    padding: 80px 20px;
    text-align: center;
}

.hero h2 {
    font-size: 34px;
    color: #d63384;
}

.hero p {
    font-size: 16px;
}

.section {
    padding: 50px 20px;
    text-align: center;
}

.section h2 {
    color: #d63384;
    margin-bottom: 30px;
    font-family: 'Playfair Display', serif;
}

.products {
    display: flex;
    justify-content: center;
    gap: 25px;
    flex-wrap: wrap;
}

.card {
    width: 260px;
    border-radius: 20px;
    overflow: hidden;
    background: #fff;
    box-shadow: 0 6px 15px rgba(0,0,0,0.1);
    transition: 0.3s;
}

.card:hover {
    transform: translateY(-8px);
}

.card img {
    width: 100%;
    height: 220px;
    object-fit: cover;
    transition: 0.3s;
}

.card:hover img {
    transform: scale(1.05);
}

.card h3 {
    margin: 12px 0;
}

footer {
    background: #ffe4ec;
    padding: 20px;
    text-align: center;
    margin-top: 30px;
}
</style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
    <h2>EVAARA</h2>
    <a href="#">🏠 Home</a>
    <a href="#nails">💅 Nails</a>
    <a href="#bags">👜 Bags</a>
    <a href="#dresses">👗 Dresses</a>
</div>

<!-- MAIN -->
<div class="main">

<header>
    <h1>EVAARA</h1>
</header>

<section class="hero">
    <h2>Elegant Fashion for Every Girl ✨</h2>
    <p>Luxury nails, chic bags & dreamy dresses</p>
</section>

<section id="nails" class="section">
    <h2>Nails💅</h2>
    <div class="products">
        <div class="card">
            <img src="images/nail1.jpg">
            <h3>Glossy Nails</h3>
        </div>
        <div class="card">
            <img src="images/nail2.jpg">
            <h3>Matte Nails</h3>
        </div>
    </div>
</section>

<section id="bags" class="section">
    <h2>Bags 👜</h2>
    <div class="products">
        <div class="card">
            <img src="images/bag1.jpg">
            <h3>Luxury Bag</h3>
        </div>
        <div class="card">
            <img src="images/bag2.jpg">
            <h3>Mini Shoulder Bag</h3>
        </div>
    </div>
</section>

<section id="dresses" class="section">
    <h2>Dress 👗</h2>
    <div class="products">
        <div class="card">
            <img src="images/dress1.jpg">
            <h3>Elegant Dress</h3>
        </div>
        <div class="card">
            <img src="images/dress2.jpg">
            <h3>Casual Outfit</h3>
        </div>
    </div>
</section>

<footer>
    <p>© 2026 EVAARA | Elegant & Feminine Fashion</p>
</footer>

</div>

</body>
</html>
